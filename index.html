<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hozokura 编辑器</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-bg"></div>
    <div class="app-container">
      <header class="glass-header">
        <div class="header-left">
            <h1>Hozokura Writer</h1>
        </div>
        <div class="header-actions flex-header-actions">
          <label id="theme-toggle-wrapper" class="theme-toggle-label" title="切换明亮/夜间模式">
            <input id="theme-toggle-checkbox" type="checkbox" aria-label="切换主题" />
            <div class="theme-toggle-track"></div>
            <div class="theme-toggle-knob">
              <svg class="theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
              </svg>
              <svg class="theme-icon-moon" viewBox="0 0 24 24" fill="currentColor" stroke="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
              </svg>
            </div>
          </label>
          <button id="btn-download" class="btn-primary">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4"><path fill-rule="evenodd" d="M10 3a.75.75 0 01.75.75v6.868l2.47-2.47a.75.75 0 111.06 1.06l-3.75 3.75a.75.75 0 01-1.06 0l-3.75-3.75a.75.75 0 111.06-1.06l2.47 2.47V3.75A.75.75 0 0110 3z" clip-rule="evenodd" /><path fill-rule="evenodd" d="M4 14a.75.75 0 01.75.75v1.5a1.5 1.5 0 001.5 1.5h7.5a1.5 1.5 0 001.5-1.5v-1.5a.75.75 0 011.5 0v1.5a3 3 0 01-3 3h-7.5a3 3 0 01-3-3v-1.5A.75.75 0 014 14z" clip-rule="evenodd" /></svg>
            导出 .md
          </button>
        </div>
      </header>

      <main class="main-layout flex-col">
        <!-- Settings / Setup Pane (Top) -->
        <section class="glass-pane pane-meta-container" id="meta-container">
            <div class="meta-header" id="toggle-meta-btn">
                <h2>文章元数据设置</h2>
                <svg id="meta-toggle-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="toggle-icon"><path fill-rule="evenodd" d="M14.77 12.79a.75.75 0 01-1.06-.02L10 8.832 6.29 12.77a.75.75 0 11-1.08-1.04l4.25-4.5a.75.75 0 011.08 0l4.25 4.5a.75.75 0 01-.02 1.06z" clip-rule="evenodd" /></svg>
            </div>
            <div class="meta-content" id="meta-content">
                <div class="meta-top-row">
                    <div class="form-group">
                        <label>标题 (Title)</label>
                        <input type="text" id="meta-title" placeholder="惊人的旅程..." value="欢迎你的到来 / Welcome">
                    </div>
                    <div class="form-group">
                      <label>导出文件名 (Filename) - 可选</label>
                      <input type="text" id="meta-filename" placeholder="welcome-to-hozokura">
                    </div>
                    <div class="form-group">
                        <label>日期 (Date)</label>
                        <input type="date" id="meta-date" title="选择日期" placeholder="请选择日期">
                    </div>
                    <div class="form-group">
                        <label>分类 (Categories) - 逗号分隔</label>
                        <input type="text" id="meta-categories" placeholder="Lifestyle, Tech">
                    </div>
                    <div class="form-group">
                        <label>标签 (Tags) - 逗号分隔</label>
                        <input type="text" id="meta-tags" placeholder="Astro, Test">
                    </div>
                    <div class="form-group">
                      <label>置顶 (Pinned)</label>
                      <div class="toggle-group">
                        <label class="toggle-switch" title="置顶到文章顶部">
                          <input id="meta-pinned-checkbox" type="checkbox" aria-label="置顶" />
                          <span class="track" aria-hidden="true"></span>
                          <span class="knob" aria-hidden="true"></span>
                        </label>
                      </div>
                    </div>
                </div>
                <div class="form-group no-margin-bottom">
                    <label>摘要说明 (Description) - 可选</label>
                    <textarea id="meta-desc" placeholder="简短的总结..." rows="1"></textarea>
                </div>
            </div>
        </section>

        <!-- Editor & Preview Pane (Bottom) -->
        <div class="bottom-panes flex-row">
            <!-- Editor Pane -->
            <section class="glass-pane pane-editor">
               <div class="ios-toolbar">
                  <div class="toolbar-group">
                      <button class="tb-btn" data-action="bold" title="加粗 (Ctrl+B)"><b>B</b></button>
                      <button class="tb-btn" data-action="italic" title="斜体 (Ctrl+I)"><i>I</i></button>
                      <button class="tb-btn" data-action="strikethrough" title="删除线"><s>S</s></button>
                  </div>
                  <div class="toolbar-divider"></div>
                  <div class="toolbar-group">
                      <button class="tb-btn" data-action="h2" title="标题 2">H2</button>
                      <button class="tb-btn" data-action="h3" title="标题 3">H3</button>
                      <button class="tb-btn" data-action="quote" title="引用">”</button>
                      <button class="tb-btn" data-action="code" title="代码块">&lt;/&gt;</button>
                  </div>
                  <div class="toolbar-divider"></div>
                  <div class="toolbar-group">
                      <button class="tb-btn" data-action="link" title="链接">🔗</button>
                      <button class="tb-btn" data-action="image" title="图片">🖼️</button>
                      <button class="tb-btn" data-action="table" title="表格">▦</button>
                  </div>
                  <div class="toolbar-divider flex-grow"></div>
                  <div class="toolbar-group">
                      <button class="tb-btn sc-btn text-yellow-400" data-action="sc-warn" title="警告短代码 (Ctrl+Shift+W)">⚠</button>
                      <button class="tb-btn sc-btn text-red-400" data-action="sc-wrong" title="错误短代码 (Ctrl+Shift+E)">✕</button>
                      <button class="tb-btn sc-btn text-green-400" data-action="sc-right" title="正确短代码 (Ctrl+Shift+R)">✓</button>
                      <button class="tb-btn sc-btn text-gray-400" data-action="sc-hide" title="隐藏文字 (Ctrl+Shift+H)">🕶</button>
                  </div>
               </div>
               <textarea id="editor" spellcheck="false" placeholder="在此开始编写你的文章..."></textarea>
            </section>

            <!-- Preview Pane -->
            <section class="glass-pane pane-preview">
               <article id="preview" class="preview-content"></article>
            </section>
        </div>
      </main>

      <footer class="app-footer">
        <div class="footer-inner">
          <div class="footer-left">&copy; ERICZHAO. All rights reserved. Made for theme Hozokura</div>
          <div class="footer-right">
            <a href="https://beian.miit.gov.cn/">浙ICP备2026008960号-2</a>
            <a href="https://beian.mps.gov.cn/#/query/webSearch?code=33010202005482" rel="noreferrer noopener" target="_blank">
              <img src="https://www.beian.gov.cn/img/ghs.png" alt="公安备案" class="footer-icon">浙公网安备33010202005482号
            </a>
          </div>
        </div>
      </footer>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
